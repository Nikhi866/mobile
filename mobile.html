<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Design</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #43a047;
    }

    /* Tablet & larger screens */
    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        margin: auto;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>My Mobile App</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>Welcome 👋</h2>
      <p>This is a simple mobile-friendly design.</p>
    </div>

    <div class="card">
      <p>Tap the button below to continue.</p>
      <button>Get Started</button>
    </div>
  </div>
</body>
</html>
